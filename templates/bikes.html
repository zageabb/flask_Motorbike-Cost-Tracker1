<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Motorbikes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-3">
    <div class="container">
      <h1 class="mb-4">Motorbikes</h1>
      <ul class="list-group mb-4">
        {% for bike in bikes %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <a href="{{ url_for('bike_detail', bike_id=bike.id) }}">{{ bike.name }}</a>
          <span class="badge bg-secondary">{{ bike.expenses|length }}</span>
        </li>
        {% else %}
        <li class="list-group-item">No bikes yet</li>
        {% endfor %}
      </ul>
      <form method="post" class="row g-3">
        <div class="col-md-6">
          <input type="text" name="name" class="form-control" placeholder="New bike name" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary">Add Bike</button>
        </div>
      </form>
    </div>
  </body>
</html>
