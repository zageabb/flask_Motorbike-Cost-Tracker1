<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ bike.name }} Expenses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-3">
    <div class="container">
      <h1>{{ bike.name }} Expenses</h1>
      <form method="post" class="row g-3 mb-4">
        <div class="col-md-2">
          <input type="date" name="date" class="form-control" placeholder="Date">
        </div>
        <div class="col-md-3">
          <input type="text" name="description" class="form-control" placeholder="Description" required>
        </div>
        <div class="col-md-2">
          <input type="text" name="category" class="form-control" placeholder="Category" required>
        </div>
        <div class="col-md-2">
          <input type="text" name="user" class="form-control" placeholder="User" required>
        </div>
        <div class="col-md-2">
          <input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount" required>
        </div>
        <div class="col-md-1">
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th>User</th>
            <th class="text-end">Amount ($)</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for e in expenses %}
          <tr>
            <td>{{ e.date.strftime('%Y-%m-%d') }}</td>
            <td>{{ e.description }}</td>
            <td>{{ e.category }}</td>
            <td>{{ e.user }}</td>
            <td class="text-end">{{ '%.2f'|format(e.amount) }}</td>
            <td class="text-end">
              <a href="{{ url_for('edit_expense', expense_id=e.id) }}" class="btn btn-sm btn-secondary">Edit</a>
              <form action="{{ url_for('delete_expense', expense_id=e.id) }}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
              </form>
            </td>
          </tr>
          {% endfor %}
        </tbody>
        <tfoot>
          <tr>
            <th colspan="4">Total</th>
            <th class="text-end">{{ '%.2f'|format(total) }}</th>
            <th></th>
          </tr>
        </tfoot>
      </table>
      <a href="{{ url_for('list_bikes') }}" class="btn btn-link">Back to bikes</a>
    </div>
  </body>
</html>
