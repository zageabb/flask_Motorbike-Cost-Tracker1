<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Edit Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="p-3">
    <div class="container">
      <h1>Edit Expense</h1>
      <form method="post" class="row g-3">
        <div class="col-md-2">
          <input type="date" name="date" value="{{ expense.date.strftime('%Y-%m-%d') }}" class="form-control" required>
        </div>
        <div class="col-md-3">
          <input type="text" name="description" value="{{ expense.description }}" class="form-control" required>
        </div>
        <div class="col-md-2">
          <input type="text" name="category" value="{{ expense.category }}" class="form-control" required>
        </div>
        <div class="col-md-2">
          <input type="text" name="user" value="{{ expense.user }}" class="form-control" required>
        </div>
        <div class="col-md-2">
          <input type="number" step="0.01" name="amount" value="{{ '%.2f'|format(expense.amount) }}" class="form-control" required>
        </div>
        <div class="col-md-1">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
      <a href="{{ url_for('bike_detail', bike_id=expense.motorbike_id) }}" class="btn btn-link mt-3">Cancel</a>
    </div>
  </body>
</html>
